            <div id="settings-panel" class="sidebar-panel">
                <div class="panel-header">
                    <span class="panel-title">Общие настройки</span>
                    <button class="panel-close-btn" onclick="closePanel()">✕</button>
                </div>
                <div class="panel-content settings-panel-content">
                    <div class="settings-shell">
                        <div class="settings-stack">
                            <div class="settings-group">
                                <div class="settings-label">Графика</div>
                                <label class="checkbox-container">
                                    <input type="checkbox" id="setting-show-tracer" checked>
                                    <span class="checkmark"></span>
                                    Показывать траекторию
                                </label>
                                <label class="scene-field settings-field">
                                    <span>Цвет линии</span>
                                    <input type="color" id="setting-tracer-color" value="#38bdf8">
                                </label>
                                <label class="scene-field settings-field">
                                    <span>Толщина</span>
                                    <input type="range" id="setting-tracer-width" min="1" max="12" step="1" value="2">
                                </label>
                                <label class="scene-field settings-field settings-field--compact">
                                    <span>Форма</span>
                                    <select id="setting-tracer-shape">
                                        <option value="line">Линия</option>
                                        <option value="points">Точки</option>
                                        <option value="both">Линия и точки</option>
                                    </select>
                                </label>
                            </div>
                            <div class="settings-group">
                                <label class="checkbox-container">
                                    <input type="checkbox" id="setting-show-gizmo" checked>
                                    <span class="checkmark"></span>
                                    Показывать гизмо трансформации
                                </label>
                            </div>
                            <div class="settings-group">
                                <div class="settings-label">Скорость симуляции</div>
                                <label class="scene-field settings-field">
                                    <span>Множитель времени: <strong id="sim-speed-val">1.0x</strong></span>
                                    <input type="range" id="setting-sim-speed" min="0.25" max="3" step="0.25" value="1">
                                </label>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
